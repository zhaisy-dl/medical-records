<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ff4d4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="健康管理" />
    <title>健康管理</title>
    <style>
      /* Inline splash screen before JS loads */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.3s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash .logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: #ff4d4f;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash .logo svg {
        width: 50px;
        height: 50px;
      }
      #splash .title {
        font-size: 20px;
        font-weight: 700;
        color: #333;
        margin-bottom: 4px;
      }
      #splash .subtitle {
        font-size: 12px;
        color: #999;
        margin-bottom: 32px;
      }
      #splash .loader {
        width: 48px;
        height: 4px;
        background: #eee;
        border-radius: 2px;
        overflow: hidden;
      }
      #splash .loader-bar {
        width: 30%;
        height: 100%;
        background: #ff4d4f;
        border-radius: 2px;
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen shown immediately, hidden by React on mount -->
    <div id="splash">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <path d="M50 32 C50 32 24 12 16 24 C8 36 16 54 50 80 C84 54 92 36 84 24 C76 12 50 32 50 32Z" fill="white"/>
        </svg>
      </div>
      <div class="title">健康管理</div>
      <div class="subtitle">正在加载...</div>
      <div class="loader">
        <div class="loader-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
